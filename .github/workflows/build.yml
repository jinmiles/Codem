name: Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package extension artifact
        run: |
          package_dir="dist/codem"
          package_name="codem-v${{ steps.package.outputs.version }}"
          mkdir -p "$package_dir" release
          cp build/extension.js "$package_dir/extension.js"
          cp src/metadata.json "$package_dir/metadata.json"
          cp src/stylesheet.css "$package_dir/stylesheet.css"
          cd "$package_dir"
          zip -r "../../release/$package_name.zip" .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: codem-v${{ steps.package.outputs.version }}
          path: release/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="${{ steps.package.outputs.version }}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version v$tag_version does not match package version $package_version"
            exit 1
          fi

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: codem-v${{ steps.package.outputs.version }}
          path: release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
