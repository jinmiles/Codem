name: Desktop

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-22.04
            artifact: codem-linux
          - name: macOS
            os: macos-latest
            artifact: codem-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run app self-test
        run: cargo run --manifest-path src-tauri/Cargo.toml -- --self-test

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Build Electron Linux packages
        if: runner.os == 'Linux'
        run: npm run electron:build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.dmg
            release/electron/**/*.AppImage
            release/electron/**/*.deb

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [ "$version" != "$tauri_version" ]; then
            echo "package.json version $version does not match tauri.conf.json version $tauri_version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="${{ steps.package.outputs.version }}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version v$tag_version does not match package version $package_version"
            exit 1
          fi

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME"
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.assets[].id' |
              while read -r asset_id; do
                if [ -n "$asset_id" ]; then
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
                fi
              done
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi

          find release -type f -print0 |
            xargs -0 gh release upload "$GITHUB_REF_NAME"
