name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension artifact
        run: |
          mkdir -p dist/codem@jinmiles.github.io
          cp build/extension.js dist/codem@jinmiles.github.io/extension.js
          cp src/metadata.json dist/codem@jinmiles.github.io/metadata.json
          cp src/stylesheet.css dist/codem@jinmiles.github.io/stylesheet.css

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: codem-0.1.0
          path: dist/codem@jinmiles.github.io
